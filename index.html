<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak Celebration</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(#0f2027,#203a43,#2c5364);
    color:white;
    overflow:hidden;
}

h1{
    margin-top:80px;
    font-size:55px;
}

h2{
    font-weight:normal;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:#ffd700;
    color:black;
    margin-top:30px;
}

button:hover{
    background:#ffea55;
}

.moon{
    position:absolute;
    top:50px;
    right:100px;
    width:120px;
    height:120px;
    background:#fff8dc;
    border-radius:50%;
    box-shadow:0 0 40px #fff;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

.card{
    margin-top:40px;
    font-size:24px;
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
}

</style>
</head>

<body>

<div class="moon"></div>

<h1>🌙 Eid Mubarak 🌙</h1>
<h2>Celebrate Eid with Joy</h2>

<button onclick="playSong()">Play Eid Song</button>

<br><br>

<input id="nameInput" placeholder="Enter your name">

<button onclick="generateGreeting()">Generate Greeting</button>

<div class="card" id="greeting"></div>

<audio id="eidSong">
<source src="Eid_song.mp3" type="audio/mpeg">
</audio>

<script>

function playSong(){
    document.getElementById("eidSong").play();
}

function generateGreeting(){

let name=document.getElementById("nameInput").value;

if(name===""){
name="Friend";
}

let message="Eid Mubarak "+name+"! 🌙✨ May your heart be filled with peace, joy and blessings.";

document.getElementById("greeting").innerHTML=message;

}

// create stars

for(let i=0;i<80;i++){

let star=document.createElement("div");

star.className="star";

star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";

document.body.appendChild(star);

}

</script>

</body>
</html>
