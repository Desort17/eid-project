<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak 3D Celebration</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
text-align:center;
}

h1{
position:absolute;
top:20px;
width:100%;
font-size:48px;
z-index:2;
}

button{
position:absolute;
top:90px;
left:50%;
transform:translateX(-50%);
padding:12px 30px;
font-size:18px;
border:none;
border-radius:20px;
background:gold;
cursor:pointer;
z-index:2;
}

canvas{
display:block;
}

</style>
</head>

<body>

<h1>🌙 Eid Mubarak 🌙</h1>

<button onclick="playSong()">Play Eid Song</button>

<audio id="eidSong">
<source src="Eid_song.mp3" type="audio/mpeg">
</audio>

<script>

// play music

function playSong(){
document.getElementById("eidSong").play();
}

// scene

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

// moon

const moonGeometry = new THREE.SphereGeometry(2,32,32);

const moonMaterial = new THREE.MeshBasicMaterial({
color:0xffffcc
});

const moon = new THREE.Mesh(moonGeometry,moonMaterial);

scene.add(moon);

moon.position.set(0,0,-5);

// stars

const starGeometry = new THREE.SphereGeometry(0.05,16,16);

const starMaterial = new THREE.MeshBasicMaterial({color:0xffffff});

for(let i=0;i<200;i++){

const star = new THREE.Mesh(starGeometry,starMaterial);

star.position.x = (Math.random()-0.5)*100;
star.position.y = (Math.random()-0.5)*100;
star.position.z = -Math.random()*100;

scene.add(star);

}

// fireworks particles

let particles=[];

function createFirework(){

const particleGeometry = new THREE.SphereGeometry(0.08,8,8);

const particleMaterial = new THREE.MeshBasicMaterial({
color:Math.random()*0xffffff
});

const particle = new THREE.Mesh(particleGeometry,particleMaterial);

particle.position.set(
(Math.random()-0.5)*10,
(Math.random()-0.5)*5,
-5
);

scene.add(particle);

particles.push(particle);

}

setInterval(createFirework,300);

// animation loop

function animate(){

requestAnimationFrame(animate);

moon.rotation.y += 0.003;

particles.forEach(p=>{
p.position.y += 0.05;
});

renderer.render(scene,camera);

}

animate();

// responsive resize

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
